; PlatformIO Project Configuration File — TelePager
[platformio]
default_envs = lolin_s3_mini
src_dir = src
build_dir = C:/tmp/pa_build
build_jobs = 4

[env:lolin_s3_mini]
platform = espressif32@6.3.2
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200

; ── Flash / PSRAM configuration for ESP32-S3-N16R16 ─────────────────────────
; N16R16 = 16 MB QIO flash + 16 MB OPI PSRAM. qio_opi is required for the OPI
; PSRAM to initialise; without it the bootloader may fail on this variant.
board_build.flash_size      = 16MB
board_upload.flash_size     = 16MB
board_upload.maximum_size   = 16777216
board_build.arduino.memory_type = qio_opi
; Without this, PlatformIO falls back to the board's default 4MB-era partition
; table (two 1.25MB OTA app slots) even though flash_size=16MB above — that's
; the ceiling we kept bumping into. default_16MB.csv is Espressif's own table
; sized for the full 16MB: two 6.25MB OTA app slots (~5x headroom), 3.375MB
; spiffs (unused — TelePager has no local filesystem, network+NVS only),
; nvs, otadata, coredump. Same proven OTA convention, just correctly sized.
board_build.partitions      = default_16MB.csv

lib_deps =
  bblanchon/ArduinoJson@^7.0.0
  bodmer/TJpg_Decoder@^1.1.0   ; MJPEG frame → RGB565 decode (calls a blit cb)
  lvgl/lvgl@^9.5.0

build_flags =
  -D DEBUG_SERIAL
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D LV_CONF_INCLUDE_SIMPLE
  ; Put the project-local lv_conf.h (include/lv_conf.h) on the GLOBAL include path
  ; so the lvgl LIBRARY — not just our src/ — compiles against it. Without this the
  ; library falls back to LVGL defaults and can fail to link.
  -I include
  ; NOTE: LV_TICK_CUSTOM was removed in LVGL v9. The tick source is registered at
  ; runtime via lv_tick_set_cb(millis) in display_init(). Do not re-add it.
